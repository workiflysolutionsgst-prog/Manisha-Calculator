<!DOCTYPE html>
<html>
<head>
<title>Manisha Calculator</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;

  /* 🌆 Colorful City Background */
  background: url('https://images.unsplash.com/photo-1508057198894-247b23fe5ade') no-repeat center center/cover;
  font-family: Arial;
}

/* Glass effect */
.calculator {
  backdrop-filter: blur(15px);
  background: rgba(0,0,0,0.4);
  padding: 20px;
  border-radius: 20px;
  box-shadow: 0 0 40px rgba(0,0,0,0.6);
}

#display {
  width: 100%;
  height: 60px;
  font-size: 28px;
  text-align: right;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: rgba(0,0,0,0.6);
  color: #00ffcc;
  margin-bottom: 10px;
}

button {
  width: 60px;
  height: 60px;
  margin: 5px;
  border: none;
  border-radius: 50%;
  font-size: 18px;
  background: rgba(255,255,255,0.2);
  color: white;
  cursor: pointer;
  transition: 0.2s;
  backdrop-filter: blur(5px);
}

button:hover {
  background: rgba(255,255,255,0.4);
  transform: scale(1.1);
}

.operator {
  background: #ff9800;
}

.equal {
  background: #00e676;
}

.clear {
  background: #ff1744;
}
</style>
</head>

<body>

<div class="calculator">
<input type="text" id="display" disabled>

<br>

<button onclick="clearDisplay()" class="clear">C</button>
<button onclick="deleteLast()">⌫</button>
<button onclick="append('/')">÷</button>
<button onclick="append('*')">×</button>

<br>

<button onclick="append('7')">7</button>
<button onclick="append('8')">8</button>
<button onclick="append('9')">9</button>
<button onclick="append('-')">−</button>

<br>

<button onclick="append('4')">4</button>
<button onclick="append('5')">5</button>
<button onclick="append('6')">6</button>
<button onclick="append('+')">+</button>

<br>

<button onclick="append('1')">1</button>
<button onclick="append('2')">2</button>
<button onclick="append('3')">3</button>
<button onclick="calculate()" class="equal">=</button>

<br>

<button onclick="append('0')">0</button>
<button onclick="append('.')">.</button>

<br>

<!-- Scientific -->
<button onclick="append('Math.sin(')">sin</button>
<button onclick="append('Math.cos(')">cos</button>
<button onclick="append('Math.tan(')">tan</button>
<button onclick="append('Math.sqrt(')">√</button>

</div>

<script>
let display = document.getElementById("display");

function append(val){
  display.value += val;
}

function clearDisplay(){
  display.value = "";
}

function deleteLast(){
  display.value = display.value.slice(0, -1);
}

function calculate(){
  try {
    display.value = eval(display.value);
  } catch {
    display.value = "Error";
  }
}
</script>

</body>
</html>
